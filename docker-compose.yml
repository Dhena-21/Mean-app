version: "3.9"

services:
  mongo:
    image: mongo:6
    container_name: mongo
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    image: dhena/mean-backend:latest
    container_name: backend
    environment:
      - MONGO_URI=mongodb://mongo:27017/mean-db
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    image: dhena/mean-frontend:latest
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo_data: